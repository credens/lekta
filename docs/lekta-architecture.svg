<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2200" viewBox="0 0 1600 2200" role="img" aria-labelledby="title desc">
  <title id="title">Lekta architecture UML visual</title>
  <desc id="desc">Visual rendering of the Lekta PlantUML architecture: components, checkout sequence, OAuth sequence, and backend data model.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <style>
      .page { fill: #f8fafc; }
      .section { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 600 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .label { font: 500 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .small { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .tiny { font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; }
      .box { fill: #f8fafc; stroke: #64748b; stroke-width: 1.5; rx: 10; }
      .ios { fill: #eff6ff; stroke: #2563eb; }
      .backend { fill: #ecfdf5; stroke: #059669; }
      .external { fill: #fff7ed; stroke: #ea580c; }
      .db { fill: #fdf2f8; stroke: #db2777; }
      .actor { fill: #f1f5f9; stroke: #475569; }
      .line { stroke: #1f2937; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .softline { stroke: #64748b; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 8 8; }
      .lifeline { stroke: #94a3b8; stroke-width: 1.4; stroke-dasharray: 6 8; }
      .activation { fill: #e2e8f0; stroke: #64748b; stroke-width: 1; rx: 4; }
      .table { fill: #ffffff; stroke: #64748b; stroke-width: 1.4; rx: 8; }
      .tableHead { fill: #e2e8f0; stroke: #64748b; stroke-width: 1.4; rx: 8; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1600" height="2200"/>
  <text class="title" x="60" y="64">Lekta - Arquitectura visual</text>
  <text class="small" x="60" y="94">Render visual de docs/lekta-architecture.puml</text>

  <!-- Components -->
  <rect class="section" x="50" y="125" width="1500" height="515"/>
  <text class="subtitle" x="80" y="165">Componentes y conexiones</text>

  <rect class="actor" x="85" y="265" width="150" height="70"/>
  <text class="label" x="120" y="306">Operador</text>

  <rect class="box ios" x="290" y="195" width="410" height="380"/>
  <text class="label" x="318" y="230">iOS app SwiftUI</text>
  <rect class="box" x="320" y="255" width="160" height="48"/><text class="small" x="342" y="285">MPAuthService</text>
  <rect class="box" x="505" y="255" width="165" height="48"/><text class="small" x="522" y="285">BackendSession</text>
  <rect class="box" x="320" y="325" width="160" height="48"/><text class="small" x="338" y="355">BackendAuth</text>
  <rect class="box" x="505" y="325" width="165" height="48"/><text class="small" x="520" y="355">BackendCheckout</text>
  <rect class="box" x="320" y="395" width="180" height="58"/><text class="small" x="337" y="420">MercadoPagoService</text><text class="tiny" x="357" y="438">backend facade</text>
  <rect class="box db" x="525" y="405" width="145" height="48"/><text class="small" x="568" y="435">Keychain</text>
  <rect class="box db" x="320" y="485" width="350" height="48"/><text class="small" x="405" y="515">Local encrypted storage</text>

  <rect class="box external" x="760" y="285" width="190" height="90"/>
  <text class="label" x="792" y="325">HTTPS / nginx</text>
  <text class="small" x="812" y="350">lekta.com.ar</text>

  <rect class="box backend" x="1010" y="195" width="395" height="380"/>
  <text class="label" x="1040" y="230">Lekta backend Express</text>
  <rect class="box" x="1040" y="255" width="140" height="48"/><text class="small" x="1082" y="285">/api/auth</text>
  <rect class="box" x="1210" y="255" width="140" height="48"/><text class="small" x="1262" y="285">/api/mp</text>
  <rect class="box" x="1040" y="325" width="140" height="48"/><text class="small" x="1065" y="355">/api/checkout</text>
  <rect class="box" x="1210" y="325" width="140" height="48"/><text class="small" x="1237" y="355">/api/webhooks</text>
  <rect class="box" x="1085" y="410" width="220" height="58"/><text class="small" x="1130" y="444">MP token encryption</text>

  <rect class="box db" x="1035" y="610" width="250" height="60"/>
  <text class="label" x="1085" y="646">Postgres lekta_backend</text>
  <rect class="box external" x="1340" y="610" width="180" height="60"/>
  <text class="label" x="1378" y="646">Mercado Pago</text>

  <path class="line" d="M235 300 L290 300"/>
  <path class="line" d="M700 330 L760 330"/>
  <path class="line" d="M950 330 L1010 330"/>
  <path class="softline" d="M590 453 L590 405"/><text class="tiny" x="600" y="392">app tokens</text>
  <path class="softline" d="M400 325 L400 303"/>
  <path class="softline" d="M485 350 L505 350"/>
  <path class="softline" d="M500 425 L530 425"/>
  <path class="softline" d="M1110 303 L1140 610"/><text class="tiny" x="1125" y="548">sessions</text>
  <path class="softline" d="M1280 303 L1225 610"/><text class="tiny" x="1260" y="548">MP accounts</text>
  <path class="softline" d="M1110 373 L1160 610"/><text class="tiny" x="1080" y="548">orders/items</text>
  <path class="softline" d="M1280 373 L1200 610"/><text class="tiny" x="1262" y="548">events</text>
  <path class="line" d="M1310 280 L1400 610"/><text class="tiny" x="1322" y="438">oauth, payments, preferences</text>
  <path class="line dash" d="M1430 610 L1335 373"/><text class="tiny" x="1420" y="500">webhook</text>

  <!-- Checkout sequence -->
  <rect class="section" x="50" y="690" width="1500" height="540"/>
  <text class="subtitle" x="80" y="730">Checkout QR aprobado por webhook</text>
  <g transform="translate(80 765)">
    <rect class="actor" x="0" y="0" width="150" height="45"/><text class="small" x="45" y="28">Operador</text>
    <rect class="box ios" x="195" y="0" width="155" height="45"/><text class="small" x="225" y="28">CheckoutView</text>
    <rect class="box ios" x="395" y="0" width="190" height="45"/><text class="small" x="416" y="28">BackendSession</text>
    <rect class="box ios" x="630" y="0" width="185" height="45"/><text class="small" x="651" y="28">BackendCheckout</text>
    <rect class="box backend" x="860" y="0" width="155" height="45"/><text class="small" x="893" y="28">Backend</text>
    <rect class="box db" x="1060" y="0" width="145" height="45"/><text class="small" x="1098" y="28">Postgres</text>
    <rect class="box external" x="1250" y="0" width="155" height="45"/><text class="small" x="1286" y="28">Mercado Pago</text>
    <line class="lifeline" x1="75" y1="45" x2="75" y2="420"/>
    <line class="lifeline" x1="272" y1="45" x2="272" y2="420"/>
    <line class="lifeline" x1="490" y1="45" x2="490" y2="420"/>
    <line class="lifeline" x1="722" y1="45" x2="722" y2="420"/>
    <line class="lifeline" x1="937" y1="45" x2="937" y2="420"/>
    <line class="lifeline" x1="1132" y1="45" x2="1132" y2="420"/>
    <line class="lifeline" x1="1327" y1="45" x2="1327" y2="420"/>
    <path class="line" d="M75 78 L272 78"/><text class="tiny" x="108" y="69">Cobrar con QR</text>
    <path class="line" d="M272 115 L722 115"/><text class="tiny" x="370" y="106">createOrder(items, caja)</text>
    <path class="line" d="M722 150 L490 150"/><text class="tiny" x="540" y="141">authorize()</text>
    <path class="line" d="M490 185 L937 185"/><text class="tiny" x="596" y="176">POST /api/auth/session or /refresh</text>
    <path class="line" d="M937 220 L1132 220"/><text class="tiny" x="972" y="211">session DB</text>
    <path class="line" d="M722 255 L937 255"/><text class="tiny" x="760" y="246">POST /api/checkout/orders</text>
    <path class="line" d="M937 290 L1132 290"/><text class="tiny" x="960" y="281">order pending + items</text>
    <path class="line" d="M272 325 L722 325"/><text class="tiny" x="367" y="316">createPreference(order_id)</text>
    <path class="line" d="M937 360 L1327 360"/><text class="tiny" x="1015" y="351">POST /checkout/preferences</text>
    <path class="line dash" d="M1327 395 L937 395"/><text class="tiny" x="1058" y="386">webhook then GET payment real</text>
    <path class="line" d="M272 420 L937 420"/><text class="tiny" x="430" y="411">poll GET /api/checkout/orders/:id/status cada 2-3s</text>
  </g>

  <!-- OAuth sequence -->
  <rect class="section" x="50" y="1280" width="1500" height="410"/>
  <text class="subtitle" x="80" y="1320">OAuth Mercado Pago server-side</text>
  <g transform="translate(100 1355)">
    <rect class="actor" x="0" y="0" width="150" height="45"/><text class="small" x="45" y="28">Operador</text>
    <rect class="box ios" x="210" y="0" width="210" height="45"/><text class="small" x="232" y="28">MPConnect / MPAuth</text>
    <rect class="box ios" x="480" y="0" width="180" height="45"/><text class="small" x="505" y="28">BackendSession</text>
    <rect class="box backend" x="730" y="0" width="155" height="45"/><text class="small" x="763" y="28">Backend</text>
    <rect class="box db" x="955" y="0" width="145" height="45"/><text class="small" x="993" y="28">Postgres</text>
    <rect class="box external" x="1170" y="0" width="185" height="45"/><text class="small" x="1195" y="28">Mercado Pago OAuth</text>
    <line class="lifeline" x1="75" y1="45" x2="75" y2="285"/>
    <line class="lifeline" x1="315" y1="45" x2="315" y2="285"/>
    <line class="lifeline" x1="570" y1="45" x2="570" y2="285"/>
    <line class="lifeline" x1="807" y1="45" x2="807" y2="285"/>
    <line class="lifeline" x1="1027" y1="45" x2="1027" y2="285"/>
    <line class="lifeline" x1="1262" y1="45" x2="1262" y2="285"/>
    <path class="line" d="M75 80 L315 80"/><text class="tiny" x="118" y="71">Conectar Mercado Pago</text>
    <path class="line" d="M315 115 L1262 115"/><text class="tiny" x="585" y="106">authorization URL + PKCE + state</text>
    <path class="line dash" d="M1262 150 L315 150"/><text class="tiny" x="630" y="141">callback code + state</text>
    <path class="line" d="M315 185 L570 185"/><text class="tiny" x="390" y="176">authorize backend</text>
    <path class="line" d="M315 220 L807 220"/><text class="tiny" x="450" y="211">POST /api/mp/oauth/exchange</text>
    <path class="line" d="M807 255 L1262 255"/><text class="tiny" x="920" y="246">POST /oauth/token, client_secret solo backend</text>
    <path class="line" d="M807 285 L1027 285"/><text class="tiny" x="845" y="276">encrypt + upsert MP account</text>
  </g>

  <!-- Data model -->
  <rect class="section" x="50" y="1740" width="1500" height="405"/>
  <text class="subtitle" x="80" y="1780">Modelo de datos principal</text>
  <g transform="translate(80 1810)">
    <rect class="table" x="0" y="0" width="210" height="105"/>
    <rect class="tableHead" x="0" y="0" width="210" height="32"/>
    <text class="small" x="62" y="22">businesses</text>
    <text class="tiny" x="14" y="54">id PK</text><text class="tiny" x="14" y="74">name</text><text class="tiny" x="14" y="94">created_at / updated_at</text>

    <rect class="table" x="280" y="0" width="235" height="125"/>
    <rect class="tableHead" x="280" y="0" width="235" height="32"/>
    <text class="small" x="350" y="22">app_sessions</text>
    <text class="tiny" x="294" y="54">id PK, business_id FK</text><text class="tiny" x="294" y="74">device_id, operator_id</text><text class="tiny" x="294" y="94">refresh_token_hash</text><text class="tiny" x="294" y="114">expires_at, revoked_at</text>

    <rect class="table" x="585" y="0" width="285" height="145"/>
    <rect class="tableHead" x="585" y="0" width="285" height="32"/>
    <text class="small" x="635" y="22">mercado_pago_accounts</text>
    <text class="tiny" x="599" y="54">id PK, business_id FK</text><text class="tiny" x="599" y="74">mp_user_id</text><text class="tiny" x="599" y="94">encrypted_access_token</text><text class="tiny" x="599" y="114">encrypted_refresh_token</text><text class="tiny" x="599" y="134">expires_at, scopes</text>

    <rect class="table" x="945" y="0" width="280" height="185"/>
    <rect class="tableHead" x="945" y="0" width="280" height="32"/>
    <text class="small" x="1057" y="22">orders</text>
    <text class="tiny" x="959" y="54">id PK, business_id FK</text><text class="tiny" x="959" y="74">external_reference</text><text class="tiny" x="959" y="94">status, status_detail</text><text class="tiny" x="959" y="114">total_amount, currency</text><text class="tiny" x="959" y="134">operator_id, cash_session_id</text><text class="tiny" x="959" y="154">mp_account_id, preference_id</text><text class="tiny" x="959" y="174">mp_payment_id, approved_at</text>

    <rect class="table" x="945" y="235" width="255" height="115"/>
    <rect class="tableHead" x="945" y="235" width="255" height="32"/>
    <text class="small" x="1032" y="257">order_items</text>
    <text class="tiny" x="959" y="289">id PK, order_id FK</text><text class="tiny" x="959" y="309">barcode, title</text><text class="tiny" x="959" y="329">unit_price, quantity</text>

    <rect class="table" x="1260" y="160" width="250" height="150"/>
    <rect class="tableHead" x="1260" y="160" width="250" height="32"/>
    <text class="small" x="1300" y="182">mp_webhook_events</text>
    <text class="tiny" x="1274" y="214">id PK</text><text class="tiny" x="1274" y="234">topic, action, resource_id</text><text class="tiny" x="1274" y="254">idempotency_key</text><text class="tiny" x="1274" y="274">raw_payload jsonb</text><text class="tiny" x="1274" y="294">processed_at, status</text>

    <path class="softline" d="M210 52 L280 52"/><text class="tiny" x="220" y="42">1 to many</text>
    <path class="softline" d="M210 75 L585 75"/><text class="tiny" x="350" y="65">1 to many</text>
    <path class="softline" d="M210 100 L945 100"/><text class="tiny" x="535" y="90">1 to many</text>
    <path class="softline" d="M870 90 L945 90"/><text class="tiny" x="880" y="80">1 to many</text>
    <path class="softline" d="M1085 185 L1085 235"/><text class="tiny" x="1095" y="215">1 to many</text>
    <path class="softline" d="M1225 150 L1260 210"/><text class="tiny" x="1228" y="185">events</text>
  </g>
</svg>
